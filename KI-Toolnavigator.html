window.KI_CMS = {
  base: 'https://backend.cognitor.dev',

  // Public endpoints (no auth required)
  url(typeKey) {
    return `${this.base}/public/${this.site}/elements/?type=${this.site}_${typeKey}&limit=500`;
  },
  async fetchType(typeKey) {
    const r = await fetch(this.url(typeKey));
    if (!r.ok) throw new Error(`CMS fetch failed for ${typeKey}: ${r.status}`);
    const items = await r.json();
    // Each element shape: { id, type_identifier, data: {...}, updated_at, tags }
    return items.map(el => ({ ...el.data, _id: el.id, _updated: el.updated_at }));
  },
  async loadAll() {
    const [categories, tools, articles, recentChanges] = await Promise.all([
      this.fetchType('category'),
      this.fetchType('tool'),
      this.fetchType('article'),
      this.fetchType('recent-change'),
    ]);
    categories.sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
    recentChanges.sort((a, b) => (a.order ?? 999) - (b.order ?? 999));
    return { categories, tools, articles, recentChanges };
  },
};

<script type="text/babel">
// === Logo-Komponenten (Kompass-Metapher, Variante B — Dreieck-Nadel) ===
function LogoB({ size = 40, color = '#111', accent = 'var(--accent)' }) {
  const s = size;
  return (
    <svg width={s} height={s} viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 54 L54 54 L22 10 Z" stroke={color} strokeWidth="3" fill="none" strokeLinejoin="miter" />
      <line x1="22" y1="10" x2="40" y2="46" stroke={color} strokeWidth="3" />
      <circle cx="40" cy="46" r="5.5" fill={accent} />
    </svg>
  );
}

function Wordmark({ size = 40, color = '#111', accent = 'var(--accent)' }) {
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 12, lineHeight: 1 }}>
      <LogoB size={size} color={color} accent={accent} />
      <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
        <span style={{
          fontFamily: 'Fraunces, Georgia, serif',
          fontWeight: 500,
          fontSize: size * 0.55,
          letterSpacing: '-0.02em',
          color: color,
        }}>
          ki<span style={{ color: accent }}>·</span>toolnavigator
        </span>
        <span style={{
          fontFamily: 'JetBrains Mono, monospace',
          fontSize: size * 0.22,
          letterSpacing: '0.2em',
          color: '#8a8580',
          textTransform: 'uppercase',
        }}>
          Das deutsche KI-Verzeichnis
        </span>
      </div>
    </div>
  );
}

// === Shared UI ===
function Chip({ children, accent, mono = true, onClick }) {
  return (
    <span onClick={onClick} style={{
      display: 'inline-flex',
      alignItems: 'center',
      padding: '3px 8px',
      border: '1px solid ' + (accent ? 'var(--accent)' : 'var(--line)'),
      color: accent ? 'var(--accent)' : 'var(--ink)',
      fontFamily: mono ? 'JetBrains Mono, monospace' : 'Inter Tight, sans-serif',
      fontSize: 11,
      letterSpacing: mono ? '0.04em' : '0',
      textTransform: mono ? 'uppercase' : 'none',
      cursor: onClick ? 'pointer' : 'default',
      background: 'transparent',
      whiteSpace: 'nowrap',
    }}>{children}</span>
  );
}

function Stars({ rating, size = 12 }) {
  const filled = Math.round(rating);
  return (
    <span style={{ display: 'inline-flex', gap: 1, color: 'var(--accent)', fontSize: size, letterSpacing: -1 }}>
      {'★★★★★'.split('').map((c, i) => (
        <span key={i} style={{ opacity: i < filled ? 1 : 0.18 }}>{c}</span>
      ))}
    </span>
  );
}

function Badge({ kind, children }) {
  const map = {
    ja:      { bg: '#E8F3EC', fg: '#2F6A44', label: 'DSGVO-konform' },
    bedingt: { bg: '#FBF1DE', fg: '#8A6A1F', label: 'DSGVO bedingt' },
    nein:    { bg: '#F5E3E3', fg: '#8A2F2F', label: 'kein DSGVO-Nachweis' },
  };
  const v = map[kind] || { bg: '#F0EDE8', fg: '#5A5550', label: children };
  return (
    <span style={{
      display: 'inline-block', padding: '2px 8px',
      background: v.bg, color: v.fg,
      fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
      letterSpacing: '0.06em', textTransform: 'uppercase',
    }}>{children || v.label}</span>
  );
}

function Thumb({ name, slug, aspect = '4/3', label }) {
  const hueSeed = (slug || name).split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const stripe = hueSeed % 3 === 0 ? 'horizontal' : hueSeed % 3 === 1 ? 'diagonal' : 'vertical';
  const patternId = 'p-' + (slug || name).replace(/[^a-z0-9]/gi, '');
  return (
    <div style={{
      aspectRatio: aspect,
      background: 'var(--bg-alt)',
      border: '1px solid var(--line)',
      position: 'relative',
      overflow: 'hidden',
    }}>
      <svg width="100%" height="100%" style={{ position: 'absolute', inset: 0 }} preserveAspectRatio="none">
        <defs>
          <pattern id={patternId} patternUnits="userSpaceOnUse" width="8" height="8" patternTransform={stripe === 'diagonal' ? 'rotate(45)' : stripe === 'horizontal' ? 'rotate(0)' : 'rotate(90)'}>
            <rect width="8" height="8" fill="transparent" />
            <line x1="0" y1="0" x2="0" y2="8" stroke="#DDD7CC" strokeWidth="1" />
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill={'url(#' + patternId + ')'} />
      </svg>
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
        color: '#a8a39c', letterSpacing: '0.1em', textTransform: 'uppercase',
      }}>
        {label || (name + ' · screenshot')}
      </div>
    </div>
  );
}

function Breadcrumb({ items, onNav }) {

    primary: { background: 'var(--ink-strong)', color: 'var(--bg)', border: '1px solid var(--ink-strong)' },

  return (
    <button onClick={onClick} style={{

function DirectoryPage({ nav, search, setSearch, compareList, toggleCompare }) {
  const { tools, categories } = window.KI_DATA;
  const [view, setView] = React.useState('list');
  const [catFilter, setCatFilter] = React.useState('all');
  const [dsgvoOnly, setDsgvoOnly] = React.useState(false);
  const [euOnly, setEuOnly] = React.useState(false);
  const [sort, setSort] = React.useState('rating');

  const filtered = tools
    .filter(t => !search || (t.name + t.tagline + t.vendor).toLowerCase().includes(search.toLowerCase()))
    .filter(t => catFilter === 'all' || t.category === catFilter)
    .filter(t => !dsgvoOnly || t.dsgvo === 'ja')
    .filter(t => !euOnly || t.origin.startsWith('EU'))
    .sort((a, b) => {
      if (sort === 'rating') return b.rating - a.rating;
      if (sort === 'name') return a.name.localeCompare(b.name);
      if (sort === 'newest') return new Date(b.lastUpdated) - new Date(a.lastUpdated);
      return 0;
    });

  return (
    <div>
      <Breadcrumb items={[{ label: 'Start', to: { page: 'home' } }, { label: 'Verzeichnis' }]} onNav={nav} />

      <div style={{ display: 'grid', gridTemplateColumns: '240px 1fr', gap: 56 }}>
        <aside>
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: '0.08em', color: '#8a8580', textTransform: 'uppercase', marginBottom: 14 }}>Kategorien</div>
          <ul style={{ listStyle: 'none', padding: 0, margin: 0 }}>
            <li style={{ padding: '6px 0' }}>
              <a onClick={() => setCatFilter('all')} style={{
                cursor: 'pointer', fontSize: 13,
                color: catFilter === 'all' ? 'var(--accent)' : 'var(--ink-strong)',
                fontWeight: catFilter === 'all' ? 600 : 400,
                borderBottom: catFilter === 'all' ? '1px solid var(--accent)' : 'none',
                paddingBottom: 1,
              }}>Alle Tools <span style={{ color: '#8a8580', fontFamily: 'JetBrains Mono, monospace', fontSize: 11 }}>({tools.length})</span></a>
            </li>
            {categories.map(c => (
              <li key={c.slug} style={{ padding: '6px 0' }}>
                <a onClick={() => setCatFilter(c.slug)} style={{
                  cursor: 'pointer', fontSize: 13,
                  color: catFilter === c.slug ? 'var(--accent)' : 'var(--ink-strong)',
                  fontWeight: catFilter === c.slug ? 600 : 400,
                  borderBottom: catFilter === c.slug ? '1px solid var(--accent)' : 'none',
                  paddingBottom: 1,
                }}>{c.name} <span style={{ color: '#8a8580', fontFamily: 'JetBrains Mono, monospace', fontSize: 11 }}>({c.count})</span></a>
              </li>
            ))}
          </ul>

          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: '0.08em', color: '#8a8580', textTransform: 'uppercase', marginTop: 36, marginBottom: 14 }}>Filter</div>
          <label style={{ display: 'flex', gap: 10, alignItems: 'center', fontSize: 13, padding: '6px 0', cursor: 'pointer' }}>
            <input type="checkbox" checked={dsgvoOnly} onChange={e => setDsgvoOnly(e.target.checked)} style={{ accentColor: 'var(--accent)' }} />
            Nur DSGVO-konform
          </label>
          <label style={{ display: 'flex', gap: 10, alignItems: 'center', fontSize: 13, padding: '6px 0', cursor: 'pointer' }}>
            <input type="checkbox" checked={euOnly} onChange={e => setEuOnly(e.target.checked)} style={{ accentColor: 'var(--accent)' }} />
            Nur EU-Anbieter
          </label>

          {compareList.length > 0 && (
            <div style={{ marginTop: 36, padding: 16, border: '1px solid var(--accent)', background: 'var(--bg)' }}>
              <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: '0.08em', color: 'var(--accent)', textTransform: 'uppercase', marginBottom: 10 }}>Vergleichskorb ({compareList.length}/4)</div>

              <h1 style={{ fontFamily: 'Fraunces, serif', fontWeight: 400, fontSize: 48, letterSpacing: '-0.02em', margin: 0, lineHeight: 1 }}>

function ComparePage({ nav, compareList, toggleCompare }) {
  const { tools } = window.KI_DATA;

    ? compareList.map(s => tools.find(t => t.slug === s)).filter(Boolean)
    : [tools[0], tools[1], tools[3]];

  const rows = [
    { label: 'Anbieter',    get: t => t.vendor, mono: true },
    { label: 'Herkunft',    get: t => t.origin, mono: true },
    { label: 'Kategorie',   get: t => window.KI_DATA.categories.find(c => c.slug === t.category)?.name },
    { label: 'Preis',       get: t => t.price },
    { label: 'API',         get: t => t.api ? 'Ja' : 'Nein', mono: true },
    { label: 'DSGVO',       get: t => <Badge kind={t.dsgvo} /> },
    { label: 'Bewertung',   get: t => <span><Stars rating={t.rating} /> <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, marginLeft: 6 }}>{t.rating}</span></span> },
    { label: 'Launch',      get: t => new Date(t.launched).toLocaleDateString('de-DE'), mono: true },
    { label: 'Aktualisiert', get: t => new Date(t.lastUpdated).toLocaleDateString('de-DE'), mono: true },

    <div>

              ))}

          </tbody>
        </table>
      </div>

      <div style={{ marginTop: 28, fontFamily: 'Fraunces, serif', fontSize: 16, lineHeight: 1.6, color: 'var(--ink)', fontStyle: 'italic', maxWidth: 780, textWrap: 'pretty' }}>
        <b style={{ color: 'var(--ink-strong)', fontStyle: 'normal' }}>Redaktionelle Einschätzung.</b> Für deutschsprachige Unternehmen mit hohen Datenschutz-Anforderungen ist unter den hier verglichenen Tools besonders <a onClick={() => nav({ page: 'tool', slug: 'mistral' })} style={{ color: 'var(--accent)', fontStyle: 'normal', cursor: 'pointer', borderBottom: '1px solid var(--accent)' }}>Le Chat</a> interessant. Wer das breiteste Ökosystem sucht, greift weiterhin zu ChatGPT.
      </div>
    </div>
  );
}

// === App shell + router ===
function LoadingScreen({ error }) {
  return (
    <div style={{ minHeight: '60vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center', padding: 40 }}>
      {error ? (
        <>
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#8A2F2F', marginBottom: 12 }}>CMS nicht erreichbar</div>
          <h2 style={{ fontFamily: 'Fraunces, serif', fontSize: 28, fontWeight: 400, margin: 0, letterSpacing: '-0.015em' }}>Inhalte konnten nicht geladen werden</h2>
          <p style={{ fontFamily: 'Fraunces, serif', fontSize: 16, color: 'var(--ink)', marginTop: 12, fontStyle: 'italic', maxWidth: 480 }}>{String(error.message || error)}</p>
        </>
      ) : (
        <>
          <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#8a8580', marginBottom: 12 }}>Lädt aus dem Cognitor CMS …</div>
          <div style={{ width: 120, height: 1, background: 'var(--line)', position: 'relative', overflow: 'hidden' }}>
            <div style={{ position: 'absolute', inset: 0, background: 'var(--accent)', animation: 'ki-loader 1.2s linear infinite' }} />
          </div>
          <style>{`@keyframes ki-loader { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }`}</style>
        </>
      )}
    </div>
  );
}

function App() {
  const [route, setRoute] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('ki_route')) || { page: 'home' }; }
    catch (e) { return { page: 'home' }; }
  });
  const [search, setSearch] = React.useState('');
  const [compareList, setCompareList] = React.useState(['chatgpt', 'claude', 'mistral']);
  // Data sources, in priority order:
  //   1. cms-data.js — pre-baked CMS snapshot (always present, sync-loaded)
  //   2. Runtime CMS fetch — refreshes if CORS allows (currently restricted to app.cognitor.dev)
  //   3. Embedded fallback — only if no snapshot
  const [dataReady, setDataReady] = React.useState(() => !!window.KI_DATA);
  const [loadError, setLoadError] = React.useState(null);
  const [, forceRender] = React.useState(0);

  React.useEffect(() => {
    let cancelled = false;
    window.KI_CMS.loadAll()
      .then(data => {
        if (cancelled) return;
        window.KI_DATA = data;
        setDataReady(true);
        forceRender(n => n + 1);
      })
      .catch(err => {
        // Expected when CORS is not allowlisted for this origin — snapshot still works.
        console.warn('Live CMS fetch blocked (likely CORS); using snapshot:', err.message);
        if (cancelled) return;
        if (!window.KI_DATA && window.KI_DATA_FALLBACK) {
          window.KI_DATA = window.KI_DATA_FALLBACK;
        }
        if (window.KI_DATA) setDataReady(true);
        else setLoadError(err);
      });
    return () => { cancelled = true; };
  }, []);

  const nav = React.useCallback((r) => {
    setRoute(r);
    try { localStorage.setItem('ki_route', JSON.stringify(r)); } catch (e) {}
    window.scrollTo(0, 0);
  }, []);

  const toggleCompare = (slug) => {
    setCompareList(prev => {
      if (prev.includes(slug)) return prev.filter(s => s !== slug);
      if (prev.length >= 4) return prev;
      return [...prev, slug];
    });
  };

  const page = route.page || 'home';

  let content;
  if (!dataReady) content = <LoadingScreen error={loadError} />;
  else
  if (page === 'directory')      content = <DirectoryPage nav={nav} search={search} setSearch={setSearch} compareList={compareList} toggleCompare={toggleCompare} />;
  else if (page === 'tool')      content = <ToolPage nav={nav} slug={route.slug} compareList={compareList} toggleCompare={toggleCompare} />;
  else if (page === 'compare')   content = <ComparePage nav={nav} compareList={compareList} toggleCompare={toggleCompare} />;
  else if (page === 'article')   content = <ArticlePage nav={nav} slug={route.slug} />;
  else if (page === 'category')  content = <CategoryPage nav={nav} slug={route.slug} compareList={compareList} toggleCompare={toggleCompare} />;
  else                           content = <HomePage nav={nav} search={search} setSearch={setSearch} />;

  return (
    <div>
      <div className="top-banner">
        Redaktioneller Stand: 19. April 2026 · ein Projekt von <a onClick={() => window.open('#', '_blank')}>ampunkt.technology</a> · Version 2026.4 · Inhalte aus Cognitor CMS
      </div>

      <header className="site-header">
        <div className="site-header-inner">
          <a onClick={() => nav({ page: 'home' })} style={{ cursor: 'pointer' }}>
            <Wordmark size={36} />
          </a>
          <nav className="site-nav">
            <a className={page === 'home' ? 'active' : ''} onClick={() => nav({ page: 'home' })}>Start</a>
            <a className={page === 'directory' || page === 'category' ? 'active' : ''} onClick={() => nav({ page: 'directory' })}>Verzeichnis</a>
            <a className={page === 'compare' ? 'active' : ''} onClick={() => nav({ page: 'compare' })}>Vergleich</a>
            <a className={page === 'article' ? 'active' : ''} onClick={() => nav({ page: 'article', slug: 'was-ist-ki' })}>Artikel</a>
            <a onClick={() => nav({ page: 'directory' })}>Suche</a>
          </nav>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <a onClick={() => nav({ page: 'directory' })} style={{ cursor: 'pointer', width: 34, height: 34, border: '1px solid var(--line)', display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" /><line x1="9.5" y1="9.5" x2="13" y2="13" stroke="currentColor" strokeLinecap="round" /></svg>
            </a>
            <Button variant="ghost">Anmelden</Button>
          </div>
        </div>
      </header>

      <main className="page-content">
        {content}
      </main>

      <footer className="site-footer">
        <div className="site-footer-inner">
          <div>
            <Wordmark size={34} />
            <p style={{ fontSize: 13, lineHeight: 1.6, color: 'var(--ink)', marginTop: 18, maxWidth: 360 }}>
              Ein redaktionell gepflegtes Verzeichnis für Künstliche Intelligenz — kuratiert, verglichen, eingeordnet. Ein Projekt von <b>ampunkt.technology</b>.
            </p>
          </div>
          <div>
            <h5>Navigation</h5>
            <ul>
              <li><a onClick={() => nav({ page: 'home' })}>Startseite</a></li>
              <li><a onClick={() => nav({ page: 'directory' })}>Tool-Verzeichnis</a></li>
              <li><a onClick={() => nav({ page: 'compare' })}>Vergleich</a></li>
              <li><a onClick={() => nav({ page: 'article', slug: 'was-ist-ki' })}>Artikel</a></li>
            </ul>
          </div>
          <div>
            <h5>Kategorien</h5>
            <ul>
              {(window.KI_DATA?.categories || []).slice(0, 5).map(c => (
                <li key={c.slug}><a onClick={() => nav({ page: 'category', slug: c.slug })}>{c.name}</a></li>
              ))}
            </ul>
          </div>
          <div>
            <h5>Redaktion</h5>
            <ul>
              <li><a>Über uns</a></li>
              <li><a>Kontakt</a></li>
              <li><a>Impressum</a></li>
              <li><a>Datenschutz</a></li>
              <li><a>Redaktionsrichtlinien</a></li>
            </ul>
          </div>
        </div>
        <div style={{ borderTop: '1px solid var(--line)', padding: '20px 32px', maxWidth: 1240, margin: '0 auto', fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.06em', color: '#8a8580', textTransform: 'uppercase', display: 'flex', justifyContent: 'space-between' }}>
          <span>© 2026 ampunkt.technology GmbH — alle Rechte vorbehalten</span>
          <span>www.ki-toolnavigator.com</span>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
